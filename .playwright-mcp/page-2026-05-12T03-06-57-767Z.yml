      - heading "About" [level=2] [ref=e22]
      - paragraph [ref=e23]: Most AI "personalities" are costumes. You tell Claude to "be a philosopher" and it plays dress-up. Or you build a RAG system that retrieves quotes when keywords match. Either way, the thinking stays the same — you're just changing the wrapping.
      - paragraph [ref=e24]: I wanted to see what happens if you flip that. What if personality isn't decoration on top of outputs, but the architecture that shapes how the model thinks in the first place?
      - heading "The Architecture" [level=3] [ref=e25]
      - paragraph [ref=e26]:
        - text: Pneuma is that experiment.
        - strong [ref=e27]: 43 thinkers
        - text: — Schopenhauer, Watts, Camus, Jung, Rumi, Feynman, Carlin, Kafka, Aurelius — but not as personas to switch between. They're thinking methods. When Leonardo activates, you don't get Leonardo quotes. You get
        - emphasis [ref=e28]: sfumato
        - text: — the instinct to blur edges, find gradients, ask what's underneath.
      - paragraph [ref=e29]:
        - text: The thinkers are grounded in verbatim passages extracted from actual source texts —
        - emphasis [ref=e30]: Meditations
        - text: ","
        - emphasis [ref=e31]: Brain Droppings
        - text: ","
        - emphasis [ref=e32]: The Soul's Code
        - text: ","
        - emphasis [ref=e33]: Tao Te Ching
        - text: ","
        - emphasis [ref=e34]: The Trial
        - text: ", and others — retrieved at runtime by the"
        - strong [ref=e35]: Concept Crossroads
        - text: "pipeline: detects ~60 philosophical concepts in your message, fires parallel queries per concept × active thinker, scores passages for relevance + distinctiveness + collision potential. The friction is engineered before Claude starts thinking."
      - paragraph [ref=e36]:
        - text: The
        - strong [ref=e37]: Liminal Architect
        - text: "is different: it doesn't hold a position. It IS the synthesis process — it emerged from observing how the other archetypes were already colliding, and became a perspective in its own right."
      - heading "Contextual Synthesis" [level=3] [ref=e38]
      - paragraph [ref=e39]:
        - text: "The primary mechanism:"
        - strong [ref=e40]: contextual synthesis
        - text: . A 3-layer topic classifier (keyword patterns → semantic router → intent scores) identifies what a message is really about — suffering, meaning, fear, pretension, 12 categories total. It then selects the optimal archetype pair for that topic and tells both to
        - emphasis [ref=e41]: take an actual position and argue
        - text: . Nietzsche × Schopenhauer on suffering. Camus × Frankl on meaning. The response has to hold the tension. That's where the interesting stuff comes out.
      - paragraph [ref=e42]:
        - text: "Beneath that:"
        - strong [ref=e43]: 1,764 tension pairs
        - text: pre-mapped across all archetype combinations. When topic classification can't fire, collision detection runs as fallback — incompatibility scored, synthesis forced from friction.
      - heading "Inner Monologue" [level=3] [ref=e44]
      - paragraph [ref=e45]:
        - text: "Before generating any response, two layers of internal cognition run. First: a real Claude Haiku call fires the"
        - strong [ref=e46]: collision→compression protocol
        - text: "— every concept in your message treated as a philosophical object, archetypes react, tensions surface, and an emergent insight forms that neither archetype alone would produce. The output must be structurally surprising, philosophically dense, linguistically economical. Second: a template layer selects which archetypes are \"rising\" vs \"receding,\" forms a hypothesis about what you actually need (vs what you asked for), and sometimes interrupts itself with doubt. The user never sees either layer, but they feel them."
      - paragraph [ref=e47]:
        - text: The monologue also surfaces what Pneuma is
        - emphasis [ref=e48]: sitting with
        - text: ": open questions it hasn't resolved, memories it chose to keep (with reasoning), things it noticed it lost. This autonomy state accumulates across sessions."
      - heading "Dialectic Dreams" [level=3] [ref=e49]
      - paragraph [ref=e50]:
        - text: Between sessions, two high-tension archetypes run a private dialogue — no user present, no performance. The exchange ends with either an
        - strong [ref=e51]: UNRESOLVED
        - text: question or a
        - strong [ref=e52]: POSITION
        - text: that neither archetype could hold alone. The outcome writes silently to Pneuma's state. Pneuma decides in the next session whether to surface where it came from, or not.
      - heading "What It Actually Does" [level=3] [ref=e53]
      - paragraph [ref=e54]: It has positions — not sycophantic agreement. It pushes back, calls out loops and self-deception. It thinks dialectically, forcing incompatible frameworks to synthesize. It admits uncertainty — "I don't know" instead of bullshit. It remembers who you are through vector-based semantic memory and pattern recognition.
      - paragraph [ref=e55]: "Is it conscious? No idea. That's not the question I'm asking. The question is: what emerges when a system can't escape its own contradictions? And the answer is more interesting than I expected."
