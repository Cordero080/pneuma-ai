  - generic [ref=e134]:
    - heading "Architecture Roadmap" [level=2] [ref=e135]
    - paragraph [ref=e136]:
      - text: "Pneuma is an active system under iteration. The current architecture has known coupling points — hardcoded integrations that work but create fragility when providers change. The migration plan below is the next structural layer: replacing those integrations with standardized"
      - strong [ref=e137]: Model Context Protocol (MCP)
      - text: servers so the core AI loop has no direct knowledge of the services it depends on.
    - heading "1. Wikipedia → Ready-Made MCP Server" [level=3] [ref=e138]
    - paragraph [ref=e139]:
      - code [ref=e140]: search_wikipedia
      - text: is currently a custom Anthropic tool definition with a two-stage fetch loop baked into the intelligence layer (~75 lines). This will be replaced by an official open-source Wikipedia MCP server — deleting the hardcoded integration entirely and making Pneuma immune to Wikipedia API changes.
    - heading "2. Pneuma-Cognition → Custom MCP Server" [level=3] [ref=e141]
    - paragraph [ref=e142]: Three modules each instantiate their own OpenAI client for embeddings, and all MongoDB vector search logic is distributed across them. These will be extracted into a single MCP server. Pneuma (client) sends a string; the server handles embedding, querying, and database connection; it returns only the final semantic context. The core AI loop will have no direct knowledge of the database or embedding model.
    - heading "3. Sensory / I/O → Custom MCP Server" [level=3] [ref=e143]
    - paragraph [ref=e144]: ElevenLabs TTS, Hume AI emotion detection, and OpenAI Whisper transcription are hardcoded fetch calls tied to specific providers. Moving these to a dedicated sensory MCP server makes provider swaps transparent to the rest of the system — swap ElevenLabs for a different TTS provider without touching any conversational logic.
