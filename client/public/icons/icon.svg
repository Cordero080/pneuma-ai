<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f" />
      <stop offset="100%" style="stop-color:#1a1a25" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff96" />
      <stop offset="50%" style="stop-color:#b400ff" />
      <stop offset="100%" style="stop-color:#0096ff" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="url(#glow)" stroke-width="4" />
  <!-- Inner glow ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.3" />
  <!-- P for Pneuma -->
  <text x="256" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="240" font-weight="700" fill="url(#glow)" text-anchor="middle">P</text>
  <!-- Subtle breath/pneuma lines -->
  <path d="M 120 180 Q 180 160 220 180" stroke="#00ff96" stroke-width="3" fill="none" opacity="0.5" />
  <path d="M 292 180 Q 332 160 392 180" stroke="#b400ff" stroke-width="3" fill="none" opacity="0.5" />
</svg>